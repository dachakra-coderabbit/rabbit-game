# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  review_details: false
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/**"
      instructions: |
        At the start of EVERY PR review, run a Sentry check using the Sentry MCP.
        Steps:
        1) Query Sentry for NEW or REGRESSED issues in environment=production over the last 7 days.
        2) Prefer issues whose stack traces reference files changed in this PR.
        3) If matches exist, add a PR comment that includes for each issue:
           - Issue title
           - Frequency and trend (spiking vs stable)
           - First seen / last seen
           - Direct Sentry link
           - Most relevant stack frames and the file/line mapping
        4) Provide an actionable recommendation:
           - Minimal fix suggestion (guard, fallback, validation, error boundary, etc.)
           - A regression test proposal aligned to the Sentry repro context
           - If root cause is unclear, propose instrumentation (tags/breadcrumbs) to improve future debugging.
        5) If no relevant Sentry issues are found, state: "Sentry check: no relevant new/regressed production issues in the last 7 days."
chat:
  auto_reply: true
